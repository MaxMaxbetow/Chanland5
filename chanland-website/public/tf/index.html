body{
background:#0f172a;
color:white;
font-family:Inter,system-ui;
margin:0;
padding:40px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

.search{
width:100%;
padding:14px;
font-size:16px;
border-radius:10px;
border:none;
margin-bottom:20px;
}

.categories{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:25px;
}

.categories button{
padding:8px 14px;
border-radius:20px;
border:none;
cursor:pointer;
background:#1e293b;
color:white;
}

.categories button.active{
background:#3b82f6;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:16px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:16px;
text-align:center;
}

.card img{
width:48px;
image-rendering:pixelated;
}

.price{
margin-top:10px;
font-weight:bold;
}
</style>

let category="all"
let search=""

const grid=document.getElementById("grid")
const cats=document.getElementById("cats")

function renderCats(){
cats.innerHTML=""
CATS.forEach(c=>{
const btn=document.createElement("button")
btn.textContent=c.label
if(category===c.id) btn.classList.add("active")
btn.onclick=()=>{
category=c.id
render()
renderCats()
}
cats.appendChild(btn)
})
}

function render(){

const filtered=ITEMS.filter(i=>{
const catMatch=category==="all"||i.cat===category
const searchMatch=i.name.toLowerCase().includes(search)
return catMatch&&searchMatch
})

grid.innerHTML=""

filtered.forEach(item=>{
const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div>${item.name}</div>
<img src="${T[item.img]}">
<div class="price">от ${item.price} ap</div>
`

grid.appendChild(card)
})

}

document.getElementById("search").oninput=e=>{
search=e.target.value.toLowerCase()
render()
}

renderCats()
render()

</script>
